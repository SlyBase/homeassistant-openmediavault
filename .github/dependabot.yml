version: 2
updates:
  # Python-Pakete (pyproject.toml)
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    ignore:
      - dependency-name: "pytest"
        versions:
          - ">=9"
      - dependency-name: "pytest-asyncio"
        versions:
          - ">=1"
      - dependency-name: "pytest-cov"
        versions:
          - ">=7"
      - dependency-name: "pytest-homeassistant-custom-component"
        versions:
          - ">=0.13.247"
      - dependency-name: "pycares"
        versions:
          - ">=5"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
