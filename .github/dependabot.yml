version: 2
updates:
  # Python-Pakete (pyproject.toml)
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    assignees:
      - "slydlake"
    ignore:
      # Transitiv durch pytest-homeassistant-custom-component kontrolliert;
      # nur zusammen mit einem PHCC-Update ändern.
      - dependency-name: "pytest"
      - dependency-name: "pytest-cov"
      - dependency-name: "pytest-asyncio"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    assignees:
      - "slydlake"
