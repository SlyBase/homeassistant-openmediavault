name: Release

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag (e.g. v2.0.0)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v2.0.0)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        id: release
        run: |
          TAG_INPUT="${{ inputs.tag || github.event.inputs.tag }}"
          TAG_INPUT="${TAG_INPUT#refs/tags/}"
          VERSION="${TAG_INPUT#v}"

          if [ -z "$VERSION" ]; then
            echo "Release tag input is required" >&2
            exit 1
          fi

          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ steps.release.outputs.tag }}
          fetch-depth: 0

      - name: Set version in manifest
        run: |
          jq --arg v "${{ steps.release.outputs.version }}" '.version = $v' \
            custom_components/omv/manifest.json > tmp.json
          mv tmp.json custom_components/omv/manifest.json

      - name: Extract release notes from changelog
        run: |
          version="${{ steps.release.outputs.version }}"

          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" {
              in_section = 1
              found = 1
            }
            in_section {
              if (found && $0 ~ "^## \\[" && $0 !~ "^## \\[" version "\\]") {
                exit
              }
              print
            }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "No changelog entry found for version $version" >&2
            exit 1
          fi

      - name: Append dependency updates to release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.release.outputs.tag }}"

          # Find the previous version tag (vX.Y.Z), sorted by version
          PREV_TAG=$(git tag --list 'v*' --sort=-version:refname \
            | grep -v "^${TAG}$" | head -n1)

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found — skipping dependency section"
            exit 0
          fi

          # Query merged PRs by dependabot between the two tags
          MERGE_DATE_FROM=$(git log -1 --format=%aI "$PREV_TAG")
          MERGE_DATE_TO=$(git log -1 --format=%aI "$TAG")

          DEPS=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --state merged \
            --author "app/dependabot" \
            --search "merged:${MERGE_DATE_FROM}..${MERGE_DATE_TO}" \
            --json number,title \
            --jq '.[] | "- \(.title) (#\(.number))"' 2>/dev/null || true)

          if [ -z "$DEPS" ]; then
            echo "No dependency PRs found between $PREV_TAG and $TAG"
            exit 0
          fi

          {
            echo ""
            echo "### Dependencies"
            echo ""
            echo "$DEPS"
          } >> release-notes.md

          echo "Appended $(echo "$DEPS" | wc -l | tr -d ' ') dependency PRs to release notes"

      - name: Create release ZIP
        run: |
          cd custom_components/omv
          zip -r ../../omv.zip .

      - name: Upload release asset
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          tag: ${{ steps.release.outputs.tag }}
          bodyFile: release-notes.md
          artifacts: omv.zip
          allowUpdates: true
          replacesArtifacts: true
          artifactErrorsFailBuild: true
