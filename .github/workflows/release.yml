name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v2.0.0)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Set version in manifest
        run: |
          REF="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}"
          VERSION="${REF#refs/tags/v}"
          VERSION="${VERSION#v}"
          jq --arg v "$VERSION" '.version = $v' \
            custom_components/omv/manifest.json > tmp.json
          mv tmp.json custom_components/omv/manifest.json

      - name: Create release ZIP
        run: |
          cd custom_components
          zip -r ../omv.zip omv/

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: omv.zip
